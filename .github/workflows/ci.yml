name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Chechout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test

      - name: Build jar
        run: ./gradlew build -x test

      - name: Build Docker image
        run: docker build -t task-manager-test:${{ github.sha }} .